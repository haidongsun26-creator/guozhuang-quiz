<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>过程装备基础刷题</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; padding-bottom: 70px; }
.header { background: linear-gradient(135deg, #4A90D9, #357ABD); color: #fff; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 20px; }
.header .back { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 24px; cursor: pointer; display: none; }
.container { max-width: 600px; margin: 0 auto; padding: 12px; }

/* 统计卡片 */
.stats-card { background: linear-gradient(135deg, #4A90D9, #357ABD); color: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.stats-card h3 { font-size: 16px; margin-bottom: 12px; opacity: .8; }
.stats-head { display: flex; justify-content: space-between; align-items: center; }
.stats-reset { font-size: 12px; opacity: .85; background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.45); color: #fff; padding: 4px 12px; border-radius: 12px; cursor: pointer; }
.stats-reset:active { background: rgba(255,255,255,.3); }
.stats-grid { display: flex; justify-content: space-around; text-align: center; }
.stats-num { font-size: 28px; font-weight: bold; }
.stats-label { font-size: 12px; opacity: .8; margin-top: 4px; }

/* 功能入口 */
.section-title { font-size: 16px; font-weight: bold; margin: 16px 0 10px; padding-left: 4px; }
.menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.menu-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.menu-item { background: #fff; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.08); transition: transform .15s; position: relative; }
.menu-item:active { transform: scale(.96); }
.menu-icon { font-size: 32px; margin-bottom: 8px; }
.menu-text { font-size: 14px; color: #333; }
.menu-badge { position: absolute; top: 8px; right: 8px; background: #ff4d4f; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; }

/* 题型列表 */
.type-item { background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.type-name { font-size: 15px; }
.type-count { font-size: 13px; color: #999; margin-top: 4px; }
.type-arrow { font-size: 20px; color: #ccc; }

/* 章节列表 */
.chapter-item { background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.chapter-name { font-size: 15px; font-weight: 500; }
.chapter-count { font-size: 13px; color: #999; margin-top: 4px; }

/* 答题页 */
.q-progress { display: flex; align-items: center; margin-bottom: 12px; gap: 10px; }
.q-progress .num { font-size: 24px; font-weight: bold; color: #4A90D9; }
.q-progress .total { font-size: 14px; color: #999; }
.q-progress .bar { flex: 1; height: 8px; background: #e8e8e8; border-radius: 4px; overflow: hidden; }
.q-progress .fill { height: 100%; background: #4A90D9; border-radius: 4px; transition: width .3s; }
.q-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
.q-meta { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.q-meta .tag { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 12px; }
.tag-s { background: #e6f7ff; color: #1890ff; }
.tag-m { background: #f6ffed; color: #52c41a; }
.tag-j { background: #fff7e6; color: #fa8c16; }
.tag-ch { background: #f0f0f0; color: #666; }
.q-text { font-size: 16px; line-height: 1.7; margin-bottom: 16px; }
.opt-item { display: flex; align-items: flex-start; padding: 12px 14px; margin-bottom: 8px; background: #f5f5f5; border-radius: 8px; border: 2px solid transparent; cursor: pointer; transition: all .2s; }
.opt-item:active { background: #e6f7ff; }
.opt-item.selected { border-color: #4A90D9; background: #e6f7ff; }
.opt-item.correct { border-color: #52c41a; background: #f6ffed; }
.opt-item.wrong { border-color: #ff4d4f; background: #fff2f0; }
.opt-item.disabled { pointer-events: none; }
.opt-key { width: 28px; height: 28px; line-height: 28px; text-align: center; background: #fff; border-radius: 50%; font-size: 14px; font-weight: bold; color: #666; margin-right: 12px; flex-shrink: 0; }
.opt-val { font-size: 14px; line-height: 28px; flex: 1; }
.opt-icon { font-size: 18px; font-weight: bold; margin-left: 8px; line-height: 28px; }
.opt-icon.ok { color: #52c41a; }
.opt-icon.no { color: #ff4d4f; }

.judge-grid { display: flex; gap: 12px; }
.judge-btn { flex: 1; padding: 16px; text-align: center; background: #f5f5f5; border-radius: 10px; border: 2px solid transparent; font-size: 18px; cursor: pointer; transition: all .2s; }
.judge-btn:active { background: #e6f7ff; }
.judge-btn.selected { border-color: #4A90D9; background: #e6f7ff; }
.judge-btn.correct { border-color: #52c41a; background: #f6ffed; }
.judge-btn.wrong { border-color: #ff4d4f; background: #fff2f0; }
.judge-btn.disabled { pointer-events: none; }

.result-box { padding: 14px; border-radius: 8px; margin: 16px 0; font-size: 15px; }
.result-box.ok { background: #f6ffed; color: #52c41a; font-weight: bold; }
.result-box.fail { background: #fff2f0; color: #ff4d4f; font-weight: bold; }
.correct-info { font-size: 14px; color: #666; margin-bottom: 12px; }
.action-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid #f0f0f0; margin-top: 16px; }
.fav-btn { cursor: pointer; font-size: 14px; color: #faad14; padding: 8px 0; }
.next-btn { background: #4A90D9; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 15px; cursor: pointer; }
.next-btn:active { background: #357ABD; }

/* 结果页 */
.result-card { background: linear-gradient(135deg, #4A90D9, #357ABD); border-radius: 12px; padding: 40px 20px; text-align: center; color: #fff; margin-bottom: 16px; }
.score-circle { width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 16px; }
.score-num { font-size: 42px; font-weight: bold; line-height: 1; }
.score-unit { font-size: 14px; opacity: .8; }
.result-title { font-size: 22px; font-weight: bold; margin-bottom: 8px; }
.result-sub { font-size: 14px; opacity: .8; }
.action-buttons { display: flex; gap: 12px; margin-top: 20px; }
.action-buttons button { flex: 1; padding: 14px; border-radius: 10px; font-size: 16px; border: none; cursor: pointer; }
.btn-primary { background: #4A90D9; color: #fff; }
.btn-ghost { background: #f0f0f0; color: #666; }

/* 底部导航 */
.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; display: flex; border-top: 1px solid #e8e8e8; z-index: 100; max-width: 600px; margin: 0 auto; }
.tab-item { flex: 1; text-align: center; padding: 8px 0; cursor: pointer; font-size: 11px; color: #999; }
.tab-item.active { color: #4A90D9; }
.tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }

/* 加载 */
.loading { text-align: center; padding: 60px 0; color: #999; font-size: 15px; }
/* 多选提交按钮 */
.submit-btn { background: #4A90D9; color: #fff; border: none; width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 12px; display: none; }
.submit-btn.show { display: block; }
/* 登录 / 注册 */
.auth-card { background: #fff; border-radius: 12px; padding: 28px 22px; margin-top: 40px; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
.auth-title { font-size: 20px; font-weight: bold; text-align: center; margin-bottom: 20px; color: #333; }
.auth-input { width: 100%; padding: 12px 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
.auth-input:focus { border-color: #4A90D9; }
.auth-err { color: #ff4d4f; font-size: 13px; min-height: 18px; margin-bottom: 6px; }
.auth-btn { width: 100%; background: #4A90D9; color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; }
.auth-btn:active { background: #357ABD; }
.auth-switch { text-align: center; color: #4A90D9; font-size: 14px; margin-top: 16px; cursor: pointer; }
.auth-tip { text-align: center; color: #999; font-size: 12px; margin-top: 14px; line-height: 1.6; }
/* 用户栏 */
.user-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.user-bar .uname { font-size: 14px; color: #333; font-weight: 500; }
.user-bar .logout { font-size: 12px; color: #999; background: none; border: 1px solid #ddd; padding: 5px 12px; border-radius: 12px; cursor: pointer; }
.user-bar .logout:active { background: #f0f0f0; }
/* 继续上次答题 */
.resume-bar { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, #52c41a, #389e0d); color: #fff; border-radius: 10px; padding: 14px 18px; margin-bottom: 12px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.resume-bar:active { opacity: .92; }
.resume-title { font-size: 15px; font-weight: bold; }
.resume-sub { font-size: 12px; opacity: .9; margin-top: 3px; }
/* 选择题目按钮 + 题目目录 */
.pick-btn { flex-shrink: 0; font-size: 12px; color: #4A90D9; background: #fff; border: 1px solid #4A90D9; border-radius: 14px; padding: 5px 12px; cursor: pointer; }
.pick-btn:active { background: #e6f7ff; }
.submit-btn.disabled { opacity: .5; pointer-events: none; }
.qpicker { display: none; position: fixed; inset: 0; z-index: 200; }
.qp-mask { position: absolute; inset: 0; background: rgba(0,0,0,.45); }
.qp-panel { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 92%; max-width: 560px; max-height: 80vh; overflow-y: auto; background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 6px 24px rgba(0,0,0,.2); }
.qp-head { display: flex; justify-content: space-between; align-items: center; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
.qp-close { font-size: 18px; color: #999; cursor: pointer; padding: 0 6px; }
.qp-legend { font-size: 12px; color: #888; margin-bottom: 12px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.qp-dot { display: inline-block; width: 12px; height: 12px; border-radius: 3px; background: #f0f0f0; border: 1px solid #ddd; margin: 0 2px 0 8px; }
.qp-dot.current { background: #4A90D9; border-color: #4A90D9; }
.qp-dot.correct { background: #52c41a; border-color: #52c41a; }
.qp-dot.wrong { background: #ff4d4f; border-color: #ff4d4f; }
.qp-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
.qp-cell { background: #f5f5f5; border: 1px solid #e8e8e8; border-radius: 8px; padding: 8px 0; text-align: center; cursor: pointer; color: #333; line-height: 1.3; }
.qp-cell b { display: block; font-size: 15px; }
.qp-cell span { font-size: 11px; color: #999; }
.qp-cell:active { transform: scale(.95); }
.qp-cell.current { background: #e6f7ff; border-color: #4A90D9; color: #4A90D9; }
.qp-cell.correct { background: #f6ffed; border-color: #52c41a; }
.qp-cell.correct span { color: #52c41a; }
.qp-cell.wrong { background: #fff2f0; border-color: #ff4d4f; }
.qp-cell.wrong span { color: #ff4d4f; }
.qp-finish { width: 100%; margin-top: 14px; background: #4A90D9; color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 15px; cursor: pointer; }
.qp-finish:active { background: #357ABD; }
.q-fig { max-width: 100%; display: block; margin: 12px auto 4px; border: 1px solid #eaeaea; border-radius: 6px; background: #fff; }
/* 自定义确认弹窗(替代原生 confirm,统一 取消/确定,确定为红色) */
.cf-mask { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 24px; }
.cf-box { background: #fff; border-radius: 14px; width: 100%; max-width: 320px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,.25); }
.cf-msg { padding: 24px 20px; font-size: 15px; line-height: 1.6; color: #333; text-align: center; white-space: pre-wrap; }
.cf-btns { display: flex; border-top: 1px solid #f0f0f0; }
.cf-btn { flex: 1; padding: 14px; font-size: 16px; border: none; background: #fff; cursor: pointer; }
.cf-btn.cf-cancel { color: #666; border-right: 1px solid #f0f0f0; }
.cf-btn.cf-ok { color: #ff4d4f; font-weight: bold; }
.cf-btn:active { background: #f5f5f5; }
</style>
</head>

</div>

<div id="qpicker" class="qpicker"></div>

    }
    H[0]=(H[0]+a)|0; H[1]=(H[1]+b)|0; H[2]=(H[2]+c)|0; H[3]=(H[3]+d)|0;
    H[4]=(H[4]+e)|0; H[5]=(H[5]+f)|0; H[6]=(H[6]+g)|0; H[7]=(H[7]+h)|0;
  }
  return H.map(x => (x >>> 0).toString(16).padStart(8, '0')).join('');
}
function hashPwd(p) { return sha256Hex(PWD_SALT + p); }
function getUsers() { return (typeof USERS === 'object' && USERS) ? USERS : {}; }

// ===== 存储(按当前账号隔离) =====
const K = k => CONFIG.storagePrefix + 'u_' + currentUser + '_' + k;
const load = (k, d) => { try { return JSON.parse(localStorage.getItem(K(k))) || d; } catch { return d; } };
const save = (k, v) => localStorage.setItem(K(k), JSON.stringify(v));
let wrongList = [];
let favList = [];
let progress = { total: 0, correct: 0, wrong: 0 };
function loadUserData() {
  wrongList = load('wrong', []);
  favList = load('fav', []);
  progress = load('progress', { total: 0, correct: 0, wrong: 0 });
}

let currentPage = 'home';
let pageStack = [];

// ===== 初始化 =====
function init() {
  try {
    document.title = CONFIG.title;
    // 过滤无答案或无选项的脏数据
    ALL = ALL_DATA.filter(q => q.answer && (q.type === 'judge' || (q.options && q.options.length)));
    ALL.forEach(q => { if (q.question && q.question.indexOf("{{fig") >= 0) q.question = q.question.replace(/\{\{(fig\d)\}\}/g, (m, k) => (typeof FIGS !== "undefined" && FIGS[k]) ? '<img class="q-fig" src="' + FIGS[k] + '">' : ""); });
    // 保留题库自带的 id;缺失或重复时才自动补号,保证错题/收藏去重可靠
    const seen = new Set();
    ALL.forEach((q, i) => {
      if (q.id == null || seen.has(q.id)) q.id = 'q' + (i + 1);
      seen.add(q.id);
    });
    // 按题库中出现的先后排列章节(不能用 sort,否则"第八章"会排到"第三章"前面)
    CHAPTERS = [...new Set(ALL.map(q => q.chapter))];
    // 登录态:当前账号仍在白名单内则直接进首页,否则进登录页
    const u = loadGlobal('currentUser', null);
    if (u && getUsers()[u]) { currentUser = u; loadUserData(); showHome(); }
    else { currentUser = null; showLogin(); }
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="loading">加载失败<br>' + e.message + '</div>';
  }
}

function loginAccount(u, p) {

  loadUserData();

// ===== 自定义确认弹窗(取消/确定,确定红色;替代各浏览器样式不一的原生 confirm) =====
function askConfirm(message, onOk) {
  const mask = document.createElement('div');
  mask.className = 'cf-mask';
  const box = document.createElement('div');
  box.className = 'cf-box';
  const msg = document.createElement('div');
  msg.className = 'cf-msg';
  msg.textContent = message;
  const btns = document.createElement('div');
  btns.className = 'cf-btns';
  const cancel = document.createElement('button');
  cancel.className = 'cf-btn cf-cancel';
  cancel.textContent = '取消';
  const ok = document.createElement('button');
  ok.className = 'cf-btn cf-ok';
  ok.textContent = '确定';
  btns.appendChild(cancel); btns.appendChild(ok);
  box.appendChild(msg); box.appendChild(btns);
  mask.appendChild(box);
  document.body.appendChild(mask);
  const close = () => { if (mask.parentNode) mask.parentNode.removeChild(mask); };
  cancel.onclick = close;
  ok.onclick = () => { close(); if (onOk) onOk(); };
  mask.addEventListener('click', e => { if (e.target === mask) close(); });
}

function addWrong(q) {
  if (!wrongList.find(x => x.id === q.id)) {
    wrongList.unshift(q);
    save('wrong', wrongList);
  }
}

// ===== 通用 =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function goBack() {
  if (pageStack.length) { pageStack.pop()(); } else { showHome(); }

function setPage(page, title) {

  document.getElementById('tabBar').style.display = topLevel ? 'flex' : 'none';
  document.querySelectorAll('.tab-item').forEach((t, i) => {

}

// 可续做的刷题模式(首页"继续"入口按此列表扫描;每个模式各存各的进度)
const QUIZ_MODES = [
  { mode: 'random', title: '随机刷题' },
  { mode: 'exam', title: '模拟考试' },
  { mode: 'type_single', title: '单项选择题' },
  { mode: 'type_multiple', title: '多项选择题' },
  { mode: 'type_judge', title: '判断题' },
  { mode: 'wrong', title: '错题重练' },
  { mode: 'fav', title: '收藏练习' }
];
function startRandom() { launchQuiz('random', '随机刷题', false, () => shuffle(ALL)); }
function startByType(type) { const names = { single: '单项选择题', multiple: '多项选择题', judge: '判断题' }; launchQuiz('type_' + type, names[type], false, () => shuffle(ALL.filter(q => q.type === type))); }
function startExam() {
  launchQuiz('exam', '模拟考试', true, () => {
    const single = shuffle(ALL.filter(q => q.type === 'single')).slice(0, CONFIG.exam.single);
    const multiple = shuffle(ALL.filter(q => q.type === 'multiple')).slice(0, CONFIG.exam.multiple);
    const judge = shuffle(ALL.filter(q => q.type === 'judge')).slice(0, CONFIG.exam.judge);
    return [...single, ...multiple, ...judge];
  });
}

let quizState = {};

// ===== 本地做题进度(按账号 + 按模式分别保存,退出后各自可继续) =====
function quizKey(mode) { return 'quiz_' + mode; }
function loadQuizMode(mode) { return load(quizKey(mode), null); }
function savedAnsweredCount(s) { return (s && s.results ? s.results : []).filter(r => r === true || r === false).length; }
function hasProgress(s) { return !!(s && s.questions && s.questions.length && (savedAnsweredCount(s) > 0 || (s.index || 0) > 0)); }
function saveQuiz() {
  if (!quizState.questions || !quizState.questions.length || !quizState.mode) return;
  save(quizKey(quizState.mode), {
    questions: quizState.questions, index: quizState.index,
    correct: quizState.correct, wrong: quizState.wrong, score: quizState.score,
    results: quizState.results, userAnswers: quizState.userAnswers,
    title: quizState.title, isExam: quizState.isExam, mode: quizState.mode
  });
}
function clearQuiz() { if (quizState.mode) { try { localStorage.removeItem(K(quizKey(quizState.mode))); } catch (e) {} } }
function resumeQuizMode(mode, backFn) {
  const s = loadQuizMode(mode);
  if (!s || !s.questions || !s.questions.length) { showHome(); return; }
  pageStack.push(backFn || showHome);
  setPage('quiz', s.title);
  quizState = {
    questions: s.questions,
    index: Math.min(s.index || 0, s.questions.length - 1),
    correct: s.correct || 0, wrong: s.wrong || 0, score: s.score || 0,
    // JSON 把稀疏数组的空位序列化成 null,这里还原成 undefined(代表"未作答")
    results: (s.results || []).map(r => (r === true || r === false) ? r : undefined),
    userAnswers: s.userAnswers || [],
    answered: false, userAnswer: '', selectedKeys: new Set(),
    title: s.title, isExam: !!s.isExam, mode: mode
  };
  renderQuestion();
}

// 启动某模式:若该模式有未完成进度,先确认是否覆盖重开(想继续请走首页绿色"继续"入口);backFn=返回目标
function launchQuiz(mode, title, isExam, buildFn, backFn) {
  const saved = loadQuizMode(mode);
  const _proceed = () => {
    const questions = buildFn();
    if (!questions.length) { alert('该范围内暂无题目'); return; }
    pageStack.push(backFn || showHome);
    startQuiz(questions, title, isExam, mode);
  };
  if (hasProgress(saved)) {
    askConfirm('《' + title + '》还有未完成的进度(已答 ' + savedAnsweredCount(saved) + '/' + saved.questions.length + ')。\n重新开始会覆盖它(想继续请点首页绿色「继续」按钮)。确定重新开始吗?', _proceed);
  } else {
    _proceed();
  }
}

function startQuiz(questions, title, isExam, mode) {
  if (!questions.length) { alert('该范围内暂无题目'); goBack(); return; }
  setPage('quiz', title);
  // results[i]/userAnswers[i]:每题已提交的对错与作答(支持"选择题目"跳转后回显);
  // selectedKeys/userAnswer 是"当前题未提交的草稿选择";mode=续做存储模式键(无则不保存,如"再做一次")。
  quizState = { questions, index: 0, correct: 0, wrong: 0, score: 0, results: [], userAnswers: [], answered: false, userAnswer: '', selectedKeys: new Set(), title, isExam: !!isExam, mode: mode || null };
  saveQuiz();
  renderQuestion();
}

function renderQuestion() {
  const { questions, index } = quizState;
  const q = questions[index];
  // 该题是否已提交:看 results[index];已提交则回显已记录的作答,未提交则用草稿
  const answered = quizState.results[index] !== undefined;
  quizState.answered = answered; // 同步当前题作答态,供外部读取
  const userAnswer = answered ? quizState.userAnswers[index] : quizState.userAnswer;
  const selectedKeys = answered ? new Set((userAnswer || '').split('')) : quizState.selectedKeys;
  const pct = Math.round((index + 1) / questions.length * 100);
  const isJudge = q.type === 'judge';
  const isMultiple = q.type === 'multiple';

  let optionsHtml = '';
  if (isJudge) {
    const vals = ['对', '错'];
    optionsHtml = `<div class="judge-grid">${vals.map(v => {
      let cls = 'judge-btn';
      if (answered) {
        cls += ' disabled';
        if (v === q.answer) cls += ' correct';
        else if (v === userAnswer && v !== q.answer) cls += ' wrong';
      } else if (v === userAnswer) {
        cls += ' selected';
      }
      return `<div class="${cls}" onclick="${answered?'':'selectJudge(\''+v+'\')'}">${v==='对'?'✓ 对':'✗ 错'}</div>`;
    }).join('')}</div>`;
  } else {
    optionsHtml = q.options.map(opt => {
      let cls = 'opt-item';
      let icon = '';
      if (answered) {
        cls += ' disabled';
        if (q.answer.includes(opt.key)) { cls += ' correct'; icon = '<span class="opt-icon ok">✓</span>'; }
        else if (selectedKeys.has(opt.key)) { cls += ' wrong'; icon = '<span class="opt-icon no">✗</span>'; }
      } else if (selectedKeys.has(opt.key)) {
        cls += ' selected';
      }
      return `<div class="${cls}" onclick="${answered?'':'selectOpt(\''+opt.key+'\')'}">
        <div class="opt-key">${opt.key}</div><div class="opt-val">${opt.value}</div>${icon}</div>`;
    }).join('');
  }

  let resultHtml = '';
  if (answered) {
    const isCorrect = userAnswer === q.answer;
    resultHtml = `<div class="result-box ${isCorrect?'ok':'fail'}">
      ${isCorrect?'✓ 回答正确！':'✗ 回答错误，正确答案是 '+q.answer}
    </div>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="q-progress">
      <span class="num">${index+1}</span><span class="total">/ ${questions.length}</span>
      <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
      <button class="pick-btn" onclick="openQuestionPicker()">☰ 选择题目</button>
    </div>
    <div class="q-card">
      <div class="q-meta">
        <span class="tag tag-${q.type[0]}">${{single:'单选',multiple:'多选',judge:'判断'}[q.type]}</span>
        <span class="tag tag-ch">${q.chapter}</span>
      </div>
      <div class="q-text">${q.question}</div>
      ${optionsHtml}
      ${resultHtml}
      ${!answered ? `<button class="submit-btn show${userAnswer ? '' : ' disabled'}" onclick="submitAnswer()">确认提交</button>` : ''}
      <div class="action-bar">
        <div class="fav-btn" onclick="toggleFav()">${isFav(q.id)?'★ 已收藏':'☆ 收藏'}</div>
        ${answered?`<button class="next-btn" onclick="nextQ()">${index<questions.length-1?'下一题':'查看结果'}</button>`:''}
      </div>
    </div>
  `;
}

// 选择 = 仅标记草稿,不直接提交(单选/判断/多选都需点"确认提交")
function selectOpt(key) {
  if (quizState.results[quizState.index] !== undefined) return; // 已提交不可改
  const q = quizState.questions[quizState.index];
  if (q.type === 'single') {
    quizState.selectedKeys = new Set([key]);
    quizState.userAnswer = key;
  } else {
    if (quizState.selectedKeys.has(key)) quizState.selectedKeys.delete(key);
    else quizState.selectedKeys.add(key);
    quizState.userAnswer = [...quizState.selectedKeys].sort().join('');
  }
  renderQuestion();
}

function selectJudge(val) {
  if (quizState.results[quizState.index] !== undefined) return;
  quizState.userAnswer = val;
  renderQuestion();
}

// 确认提交(所有题型统一入口)
function submitAnswer() {
  if (quizState.results[quizState.index] !== undefined) return;
  if (!quizState.userAnswer) return; // 未作出选择
  checkAnswer();
}
function submitMultiple() { submitAnswer(); } // 兼容旧调用

function checkAnswer() {
  const idx = quizState.index;
  const q = quizState.questions[idx];
  // 多选题:userAnswer 是已选项升序拼接,只有与正确答案完全一致才算对 → 多选/少选/错选均判错(0分)
  const correct = quizState.userAnswer === q.answer;
  const pts = (CONFIG.examPoints && CONFIG.examPoints[q.type]) || 1;
  quizState.results[idx] = correct;
  quizState.userAnswers[idx] = quizState.userAnswer;
  if (correct) { quizState.correct++; quizState.score += pts; } else { quizState.wrong++; addWrong(q); }
  progress.total++; correct ? progress.correct++ : progress.wrong++;
  save('progress', progress);
  saveQuiz();
  renderQuestion();
}

// 跳到某题(重置草稿;已提交的题会回显记录)
function gotoQuestion(i) {
  closeQuestionPicker();
  if (i < 0 || i >= quizState.questions.length) return;
  quizState.index = i;
  quizState.userAnswer = '';
  quizState.selectedKeys = new Set();
  saveQuiz();
  renderQuestion();
}

function nextQ() {
  if (quizState.index < quizState.questions.length - 1) gotoQuestion(quizState.index + 1);
  else finishQuiz();
}

function answeredCount() {
  let n = 0;
  for (let i = 0; i < quizState.questions.length; i++) if (quizState.results[i] !== undefined) n++;
  return n;
}

function finishQuiz() {
  const left = quizState.questions.length - answeredCount();
  const _done = () => { closeQuestionPicker(); showResult(); };
  if (left > 0) {
    askConfirm('还有 ' + left + ' 题未作答,确定交卷查看结果吗?', _done);
  } else {
    _done();
  }
}

// ===== 题目目录(选择题目) =====
function openQuestionPicker() {
  const { questions, index, results } = quizState;
  const cells = questions.map((q, i) => {
    let cls = 'qp-cell';
    if (i === index) cls += ' current';
    else if (results[i] === true) cls += ' correct';
    else if (results[i] === false) cls += ' wrong';
    const t = { single: '单', multiple: '多', judge: '判' }[q.type];
    return `<div class="${cls}" onclick="gotoQuestion(${i})"><b>${i + 1}</b><span>${t}</span></div>`;
  }).join('');
  const el = document.getElementById('qpicker');
  el.innerHTML = `
    <div class="qp-mask" onclick="closeQuestionPicker()"></div>
    <div class="qp-panel">
      <div class="qp-head">
        <span>选择题目（已答 ${answeredCount()} / ${questions.length}）</span>
        <span class="qp-close" onclick="closeQuestionPicker()">✕</span>
      </div>
      <div class="qp-legend"><i class="qp-dot current"></i>当前 <i class="qp-dot correct"></i>已答对 <i class="qp-dot wrong"></i>已答错 <i class="qp-dot"></i>未作答</div>
      <div class="qp-grid">${cells}</div>
      <button class="qp-finish" onclick="finishQuiz()">交卷 / 查看结果</button>
    </div>`;
  el.style.display = 'block';
}
function closeQuestionPicker() {
  const el = document.getElementById('qpicker');
  if (el) { el.style.display = 'none'; el.innerHTML = ''; }
}

// ===== 结果页 =====
function showResult() {
  clearQuiz(); // 本次答题已完成,清除"继续上次"进度
  const { questions, correct, wrong, score, results, title, isExam } = quizState;
  const typeNames = { single: '单选', multiple: '多选', judge: '判断' };
  // 按题型统计:答对数 / 题数 / 得分 / 满分
  const breakdown = ['single', 'multiple', 'judge'].map(t => {
    const idxs = questions.map((q, i) => q.type === t ? i : -1).filter(i => i >= 0);
    if (!idxs.length) return null;
    const right = idxs.filter(i => results[i]).length;
    const pts = (CONFIG.examPoints && CONFIG.examPoints[t]) || 1;
    return { name: typeNames[t], total: idxs.length, right, score: right * pts, full: idxs.length * pts };
  }).filter(Boolean);
  const totalPoints = breakdown.reduce((s, b) => s + b.full, 0);
  const singleCount = questions.filter(q => q.type === 'single').length;
  const multipleCount = questions.filter(q => q.type === 'multiple').length;
  const judgeCount = questions.filter(q => q.type === 'judge').length;
  setPage('result', title || '练习结果');
  const acc = questions.length ? Math.round(correct / questions.length * 100) : 0;
  // 考试模式按各题型分值加权计分(满分由组卷决定,标准卷为100);普通练习只展示正确率
  const scorePct = totalPoints ? Math.round(score / totalPoints * 100) : 0;
  const grade = isExam ? scorePct : acc;
  const circle = isExam
    ? `<div class="score-circle"><div class="score-num">${score}</div><div class="score-unit">/ ${totalPoints} 分</div></div>`
    : `<div class="score-circle"><div class="score-num">${acc}%</div><div class="score-unit">正确率</div></div>`;
  const breakdownHtml = isExam ? `
    <div style="background:#fff;border-radius:12px;padding:16px 20px;margin-top:12px;">
      <div style="font-size:14px;font-weight:bold;margin-bottom:8px;">得分明细</div>
      ${breakdown.map(b => `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px;border-top:1px solid #f5f5f5;">
        <span>${b.name}题（${b.total}）</span>
        <span style="color:#666;">答对 ${b.right} · <b style="color:#4A90D9;">${b.score}</b> / ${b.full} 分</span>
      </div>`).join('')}
    </div>` : '';
  document.getElementById('app').innerHTML = `
    <div class="result-card">
      ${circle}
      <div class="result-title">${grade>=90?'优秀！🎉':grade>=80?'很好👍':grade>=60?'及格':'继续加油💪'}</div>
      <div class="result-sub">单选 ${singleCount}题 · 多选 ${multipleCount}题${judgeCount ? ` · 判断 ${judgeCount}题` : ''}</div>
    </div>
    <div style="background:#fff;border-radius:12px;padding:20px;">
      <div class="stats-grid">
        <div><div class="stats-num" style="color:#4A90D9">${questions.length}</div><div class="stats-label">总题数</div></div>
        <div><div class="stats-num" style="color:#52c41a">${correct}</div><div class="stats-label">答对</div></div>
        <div><div class="stats-num" style="color:#ff4d4f">${wrong}</div><div class="stats-label">答错</div></div>
        <div><div class="stats-num" style="color:#faad14">${isExam?score+' 分':acc+'%'}</div><div class="stats-label">${isExam?'得分':'正确率'}</div></div>
      </div>
    </div>
    ${breakdownHtml}
    <div class="action-buttons">
      <button class="btn-ghost" onclick="goBack()">返回</button>
      <button class="btn-primary" onclick="showHome()">首页</button>
    </div>
  `;
}

// ===== 错题本 =====
function showWrongTab() {
  setPage('wrong', '错题本');
  if (!wrongList.length) {
    document.getElementById('app').innerHTML = '<div style="text-align:center;padding:80px 0;color:#999"><div style="font-size:48px;margin-bottom:16px">✓</div>暂无错题</div>';
    return;
  }
  document.getElementById('app').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="color:#999;font-size:13px">共 ${wrongList.length} 道</span>
      <div>
        <button onclick="clearWrong()" style="background:none;border:1px solid #ddd;padding:6px 14px;border-radius:6px;font-size:13px;color:#999;margin-right:8px">清空</button>
        <button onclick="practiceWrong()" style="background:#4A90D9;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:13px">错题重练</button>
      </div>
    </div>
    ${wrongList.map((q,i) => renderQCard(q, i, 'wrong')).join('')}
  `;
}

// ===== 收藏 =====
function showFavTab() {
  setPage('fav', '我的收藏');
  if (!favList.length) {
    document.getElementById('app').innerHTML = '<div style="text-align:center;padding:80px 0;color:#999"><div style="font-size:48px;margin-bottom:16px">⭐</div>暂无收藏</div>';
    return;
  }
  document.getElementById('app').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="color:#999;font-size:13px">共 ${favList.length} 道</span>
      <div>
        <button onclick="clearFav()" style="background:none;border:1px solid #ddd;padding:6px 14px;border-radius:6px;font-size:13px;color:#999;margin-right:8px">清空</button>
        <button onclick="practiceFav()" style="background:#4A90D9;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:13px">收藏练习</button>
      </div>
    </div>
    ${favList.map((q,i) => renderQCard(q, i, 'fav')).join('')}
  `;
}

function renderQCard(q, i, from) {
  const typeTag = {single:'tag-s',multiple:'tag-m',judge:'tag-j'}[q.type];
  const typeName = {single:'单选',multiple:'多选',judge:'判断'}[q.type];
  return `<div class="q-card" style="margin-bottom:10px">
    <div class="q-meta"><span class="tag ${typeTag}">${typeName}</span><span class="tag tag-ch">${q.chapter}</span></div>
    <div class="q-text" style="margin-bottom:8px">${q.question}</div>
    ${from === 'wrong' ? '' : `<div class="correct-info">正确答案：${q.answer}</div>`}
    <div style="text-align:right">
      <button onclick="${from==='wrong'?'removeWrong('+i+')':'removeFav('+i+')'}" style="background:none;border:1px solid #ddd;padding:4px 12px;border-radius:4px;font-size:12px;color:#999;margin-right:6px">移除</button>
      <button onclick="practiceOne('${from}',${i})" style="background:#4A90D9;color:#fff;border:none;padding:4px 12px;border-radius:4px;font-size:12px">再做一次</button>
    </div>
  </div>`;
}

function removeWrong(i) { wrongList.splice(i, 1); save('wrong', wrongList); showWrongTab(); }
function removeFav(i) { favList.splice(i, 1); save('fav', favList); showFavTab(); }
function clearWrong() { askConfirm('确定清空错题？', () => { wrongList=[]; save('wrong',wrongList); showWrongTab(); }); }
function clearFav() { askConfirm('确定清空收藏？', () => { favList=[]; save('fav',favList); showFavTab(); }); }
function practiceWrong() { launchQuiz('wrong', '错题重练', false, () => shuffle(wrongList), showWrongTab); }
function practiceFav() { launchQuiz('fav', '收藏练习', false, () => shuffle(favList), showFavTab); }
function practiceOne(listName, i) {
  const list = listName === 'wrong' ? wrongList : favList;
  const page = listName === 'wrong' ? showWrongTab : showFavTab;
  pageStack.push(page);
  startQuiz([list[i]], '做题'); // 无 mode → 不保存续做进度
}

// ===== 收藏操作 =====
function isFav(id) { return favList.some(q => q.id === id); }
function toggleFav() {
  const q = quizState.questions[quizState.index];
  if (isFav(q.id)) { favList = favList.filter(x => x.id !== q.id); } else { favList.unshift({...q}); }
  save('fav', favList);
  renderQuestion();
}

// ===== Tab 切换 =====
function showTab(tab) {
  pageStack = [];
  document.getElementById('tabBar').style.display = 'flex';
  if (tab === 'home') showHome();
  else if (tab === 'wrong') showWrongTab();
  else if (tab === 'fav') showFavTab();
}

// ===== 启动 =====
init();
</script>
</body>
</html>
